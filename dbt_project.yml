name: 'aws_ecommerce'
version: '1.0.0'

require-dbt-version: [">=1.9.0"]

profile: 'aws_ecommerce'

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  aws_ecommerce:
    +schema: raw

models:
  aws_ecommerce:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
    marts:
      +schema: marts
      +materialized: table
      customers:
        +materialized: table
      orders:
        +materialized: table
      products:
        +materialized: table
