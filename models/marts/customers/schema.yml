version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension. One row per customer, enriched with AWS region metadata.
      Used as a join key across all customer-facing analytics.
    columns:
      - name: customer_id
        description: Surrogate primary key.
        tests:
          - not_null
          - unique
      - name: email
        description: Lowercase-normalised customer email address.
        tests:
          - not_null
          - unique
      - name: geography
        description: "High-level geographic grouping: AMER | EMEA | APAC."
        tests:
          - accepted_values:
              values: [AMER, EMEA, APAC]
      - name: customer_tier
        description: "Commercial tier: starter | growth | enterprise."
        tests:
          - accepted_values:
              values: [starter, growth, enterprise]

  - name: fct_customer_lifetime_value
    description: >
      Customer Lifetime Value (CLV) fact table. One row per customer.
      Provides total revenue, order counts, recency metrics, and a simple LTV score
      and segment. This is the primary table consumed by Amazon Bedrock agents
      for customer revenue and CLV queries.

      Key business definitions:
        - total_revenue: sum of all COMPLETED order revenue (returned/cancelled orders excluded).
        - ltv_score: total_revenue × 1.2 recency bonus if the customer ordered within 90 days.
        - ltv_segment: champion (≥$10k), loyal (≥$3k), potential (≥$500), new (<$500).
    columns:
      - name: customer_id
        description: Surrogate primary key — FK to dim_customers.
        tests:
          - not_null
          - unique
      - name: total_revenue
        description: Total USD revenue from all completed orders. Excludes returned/cancelled.
        tests:
          - not_null
      - name: ltv_segment
        description: "Revenue-based segment: champion | loyal | potential | new."
        tests:
          - accepted_values:
              values: [champion, loyal, potential, new]
      - name: geography
        description: "High-level geographic grouping: AMER | EMEA | APAC."
