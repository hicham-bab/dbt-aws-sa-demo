version: 2

models:
  - name: fct_orders
    description: >
      Order fact table. One row per order, enriched with customer geography and
      order-level revenue. The primary grain for order analytics.
    columns:
      - name: order_id
        description: Surrogate primary key.
        tests:
          - not_null
          - unique
      - name: order_revenue
        description: Total order revenue in USD. Null for orders with no line items.
      - name: geography
        description: "High-level geographic grouping: AMER | EMEA | APAC."

  - name: fct_revenue_by_region
    description: >
      Revenue aggregated by AWS geography and month. Completed orders only.
      This is the primary table used to answer regional revenue questions in the
      Amazon Bedrock text-to-SQL demo (e.g. "total EMEA revenue in Q1 2025").

      Business definitions:
        - total_revenue: sum of order_revenue for completed orders only.
        - revenue_per_customer: total_revenue / unique customers placing completed orders that month.
    columns:
      - name: order_month
        description: First day of the month — the time grain for all aggregations.
        tests:
          - not_null
      - name: geography
        description: "AMER | EMEA | APAC."
        tests:
          - not_null
      - name: total_revenue
        description: Sum of all completed order revenue in USD for this region/month.
      - name: unique_customers
        description: Count of distinct customers who placed a completed order this month.
